<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>RTL layout demo</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 1.5rem; background: #020617; color: #e5e7eb; }
    header, main { padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 1rem; }
    header { background: #0b1120; }
    main { background: #020617; border: 1px solid #1f2937; }
  </style>
</head>
<body>
  <header>
    <h1>تخطيط من اليمين إلى اليسار (RTL)</h1>
  </header>
  <main>
    <p>هذا مثال بسيط لصفحة عربية مع <code>dir=&quot;rtl&quot;</code>.</p>
    <p>Обрати внимание, как поменялось направление текста и порядок колонок.</p>
  </main>
</body>
</html>
