<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Нативный &lt;dialog&gt; — showModal() vs show()</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    button { margin: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; }

    /*
      ::backdrop — псевдоэлемент, автоматически добавляемый браузером
      за модальным диалогом. Работает только с showModal().
      top-layer гарантирует, что диалог поверх всего — z-index не нужен.
    */
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    dialog {
      border: none;
      border-radius: 8px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    dialog h2 { margin-top: 0; }

    .dialog-footer {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <h1>Нативный <code>&lt;dialog&gt;</code></h1>

  <button id="open-modal">Открыть модальный диалог</button>
  <button id="open-dialog">Открыть немодальный диалог</button>

  <p id="result"></p>

  <!--
    showModal() — модальный режим:
    ✅ Автоматический focus trap (Tab/Shift+Tab не выходит за dialog)
    ✅ ESC закрывает диалог
    ✅ ::backdrop псевдоэлемент
    ✅ top-layer (поверх всего, без z-index)
    ✅ aria-modal="true" автоматически
    ✅ Всё вне диалога получает aria-hidden от браузера

    show() — немодальный режим:
    - Без backdrop
    - Без focus trap
    - Без блокировки страницы
  -->
  <dialog
    id="confirm-modal"
    aria-labelledby="modal-title"
    aria-describedby="modal-desc"
  >
    <h2 id="modal-title">Подтвердите действие</h2>
    <p id="modal-desc">
      Вы уверены, что хотите удалить этот элемент?
      Это действие нельзя отменить.
    </p>

    <!--
      Форма с method="dialog" — закрывает диалог нативно.
      dialog.returnValue будет равно value кнопки submit.
    -->
    <form method="dialog" class="dialog-footer">
      <!--
        autofocus — браузер сам переведёт фокус на эту кнопку
        при открытии диалога. Без autofocus — фокус на первом
        focusable элементе.
      -->
      <button type="submit" value="cancel" autofocus>Отмена</button>
      <button type="submit" value="confirm">Удалить</button>
    </form>
  </dialog>

  <dialog id="info-dialog" aria-labelledby="dialog-title">
    <h2 id="dialog-title">Информация</h2>
    <p>Это немодальный диалог. Страница остаётся доступной.</p>
    <button id="close-dialog">Закрыть</button>
  </dialog>

  <script>
    const modal = document.getElementById('confirm-modal');
    const infoDialog = document.getElementById('info-dialog');
    const result = document.getElementById('result');

    document.getElementById('open-modal').addEventListener('click', () => {
      modal.showModal(); // открыть как модальный
    });

    document.getElementById('open-dialog').addEventListener('click', () => {
      infoDialog.show(); // открыть как немодальный
    });

    document.getElementById('close-dialog').addEventListener('click', () => {
      infoDialog.close();
    });

    /*
      'close' событие срабатывает при закрытии — ESC, form[method=dialog],
      или программный .close().
      dialog.returnValue — value кнопки, которой закрыли.
    */
    modal.addEventListener('close', () => {
      if (modal.returnValue === 'confirm') {
        result.textContent = 'Подтверждено: элемент удалён.';
      } else {
        result.textContent = 'Отменено.';
      }
    });

    /*
      'cancel' событие срабатывает при закрытии через ESC.
      Можно предотвратить: event.preventDefault() — если нужно
      показать «Вы уверены?» перед закрытием.
    */
    modal.addEventListener('cancel', (event) => {
      // Раскомментируйте, чтобы заблокировать ESC:
      // event.preventDefault();
    });

    /*
      Закрытие по клику на backdrop.
      Нативно не поддерживается — нужен этот паттерн:
    */
    modal.addEventListener('click', (event) => {
      const rect = modal.getBoundingClientRect();
      const clickedOutside = (
        event.clientX < rect.left ||
        event.clientX > rect.right ||
        event.clientY < rect.top ||
        event.clientY > rect.bottom
      );
      if (clickedOutside) {
        modal.close('cancel');
      }
    });
  </script>

  <!--
    СРАВНЕНИЕ с кастомным modal:

    Нативный <dialog>:
    + Focus trap из коробки
    + ESC из коробки
    + ::backdrop и top-layer
    + Правильные ARIA роли автоматически
    + form[method=dialog] для закрытия
    - Стилизация backdrop ограничена
    - Нет встроенного анимации (нужен CSS + @starting-style)
    - Закрытие по backdrop — нужен JS-хак

    Кастомный modal:
    + Полный контроль над анимацией
    + Любое поведение backdrop
    - Нужно вручную: focus trap, ESC, ARIA, z-index management
    - Высокий риск a11y ошибок
  -->

</body>
</html>
