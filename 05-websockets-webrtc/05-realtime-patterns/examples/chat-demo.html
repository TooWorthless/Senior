<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Real-time Chat Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
    #app { display: flex; flex: 1; overflow: hidden; max-width: 1200px; margin: 0 auto; width: 100%; padding: 12px; gap: 12px; }

    /* Sidebar */
    #sidebar { width: 220px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; }
    .sidebar-title { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; }
    .room-btn { display: block; width: 100%; text-align: left; background: #21262d; color: #c9d1d9; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 13px; margin-bottom: 3px; }
    .room-btn.active { background: #1d4ed8; color: white; }
    .room-btn:hover:not(.active) { background: #30363d; }
    .user-item { padding: 4px 0; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; flex-shrink: 0; }
    .dot.away { background: #f59e0b; }
    .dot.busy { background: #f87171; }

    /* Main chat */
    #chat-area { flex: 1; display: flex; flex-direction: column; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    #chat-header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
    #chat-header h2 { font-size: 14px; color: #f0f6fc; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: #21262d; border-radius: 6px; padding: 8px 12px; max-width: 80%; }
    .msg.own { background: #1d3a5f; align-self: flex-end; }
    .msg.system { background: transparent; align-self: center; color: #8b949e; font-size: 11px; font-style: italic; }
    .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .msg-name { font-size: 11px; color: #58a6ff; font-weight: bold; }
    .msg.own .msg-name { color: #3fb950; }
    .msg-ts { font-size: 10px; color: #8b949e; }
    .msg-text { font-size: 13px; }
    .msg.sending { opacity: 0.6; }
    .msg.sending .msg-ts::after { content: " ⏳"; }
    #typing-indicator { padding: 4px 16px; font-size: 12px; color: #8b949e; min-height: 22px; font-style: italic; }
    #chat-input-area { padding: 12px 16px; border-top: 1px solid #30363d; display: flex; gap: 8px; }
    #msg-input { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 13px; resize: none; }
    #msg-input:focus { outline: none; border-color: #3b82f6; }
    button.send-btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: monospace; }
    button.send-btn:disabled { background: #30363d; cursor: not-allowed; }

    /* Connection */
    #topbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #topbar input { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 13px; }
    #topbar button { background: #238636; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; }
    #topbar button.red { background: #b91c1c; }
    .conn-status { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; }
    .conn-dot.open { background: #3fb950; }
    .conn-dot.closed { background: #f87171; }
    .conn-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  </style>
</head>
<body>

<div id="topbar">
  <input id="server-url" value="ws://localhost:8082" style="width:200px">
  <input id="username" placeholder="Имя" style="width:120px" value="User1">
  <button onclick="connect()">Connect</button>
  <button class="red" onclick="disconnect()">Disconnect</button>
  <span class="conn-status"><span class="conn-dot closed" id="conn-dot"></span><span id="conn-text">Disconnected</span></span>
  <span style="font-size:11px;color:#8b949e" id="client-id-display"></span>
</div>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Комнаты</div>
      <div id="rooms-list">
        <div style="color:#8b949e;font-size:12px">Подключись к серверу</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Онлайн (<span id="online-count">0</span>)</div>
      <div id="presence-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Мой статус</div>
      <select id="status-select" onchange="setStatus(this.value)" style="width:100%;background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px;border-radius:4px;font-family:monospace;font-size:12px" disabled>
        <option value="online">🟢 Online</option>
        <option value="away">🟡 Away</option>
        <option value="busy">🔴 Busy</option>
      </select>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="chat-header">
      <h2 id="room-title"># Выбери комнату</h2>
      <span id="room-members" style="font-size:12px;color:#8b949e"></span>
    </div>
    <div id="chat-messages"></div>
    <div id="typing-indicator"></div>
    <div id="chat-input-area">
      <textarea id="msg-input" rows="2" placeholder="Сообщение... (Enter = отправить)" disabled></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>Отправить</button>
    </div>
  </div>
</div>

<script>
let ws = null;
let myId = null;
let myName = null;
let currentRoom = null;
let typingTimer = null;
const pendingMessages = new Map(); // tempId → DOM element

// ─── Подключение ─────────────────────────────────
function connect() {
  disconnect();
  const url = document.getElementById("server-url").value;
  const name = document.getElementById("username").value || "User";
  setConnStatus("connecting");
  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnStatus("open");
    ws.send(JSON.stringify({ type: "init", params: { name } }));
  };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = (e) => {
    setConnStatus("closed");
    appendSystemMsg("Соединение закрыто");
  };
  ws.onerror = () => {
    setConnStatus("closed");
    appendSystemMsg("Ошибка: запусти node chat-server.js");
  };
}

function disconnect() {
  ws?.close(1000, "User disconnected");
  ws = null;
  setConnStatus("closed");
  myId = null;
}

function setConnStatus(state) {
  const dot = document.getElementById("conn-dot");
  const text = document.getElementById("conn-text");
  dot.className = "conn-dot " + state;
  text.textContent = { open: "Connected", closed: "Disconnected", connecting: "Connecting..." }[state];
}

// ─── Обработка сообщений ─────────────────────────
function handleMessage(msg) {
  switch(msg.type) {
    case "welcome":
      myId = msg.clientId;
      document.getElementById("client-id-display").textContent = `id: ${myId}`;
      break;

    case "init_ack":
      myName = msg.name;
      document.getElementById("status-select").disabled = false;
      renderRooms(msg.rooms);
      updatePresence(msg.presence);
      appendSystemMsg(`Вошёл как ${myName}`);
      break;

    case "room_joined":
      currentRoom = msg.room;
      document.getElementById("room-title").textContent = "# " + msg.room;
      document.getElementById("room-members").textContent = `${msg.members?.length || 0} участников`;
      document.getElementById("msg-input").disabled = false;
      document.getElementById("send-btn").disabled = false;
      document.querySelectorAll(".room-btn").forEach(b => b.classList.toggle("active", b.dataset.room === msg.room));
      clearMessages();
      msg.history?.forEach(m => appendMessage(m));
      appendSystemMsg(`Ты в #${msg.room} (${msg.members?.length || 0} участников)`);
      break;

    case "message":
      const pending = pendingMessages.get(msg.id);
      if (pending) {
        pending.classList.remove("sending");
        pending.querySelector(".msg-ts").textContent = formatTs(msg.ts);
        pendingMessages.delete(msg.id);
      } else {
        appendMessage(msg);
      }
      break;

    case "message_ack":
      // Обновить tempId на реальный
      const tempEl = pendingMessages.get(msg.tempId);
      if (tempEl) {
        pendingMessages.delete(msg.tempId);
        pendingMessages.set(msg.messageId, tempEl);
      }
      break;

    case "typing":
      showTyping(msg.name);
      break;

    case "stop_typing":
      hideTyping(msg.name);
      break;

    case "presence":
      updatePresence(msg.presence);
      if (msg.event === "join") appendSystemMsg(`→ ${msg.name} подключился`);
      if (msg.event === "leave") appendSystemMsg(`← ${msg.name} отключился`);
      break;

    case "user_joined":
      appendSystemMsg(`→ ${msg.name} вошёл в #${msg.room}`);
      break;

    case "user_left":
      appendSystemMsg(`← ${msg.name} покинул #${msg.room}`);
      break;

    case "stats":
      appendSystemMsg(`Сервер: ${msg.clients} клиентов | uptime: ${msg.uptime}`);
      break;

    case "error":
      appendSystemMsg(`⚠️ ${msg.error}`);
      break;
  }
}

// ─── UI helpers ───────────────────────────────────
function renderRooms(rooms) {
  const el = document.getElementById("rooms-list");
  el.innerHTML = "";
  for (const r of rooms) {
    const btn = document.createElement("button");
    btn.className = "room-btn";
    btn.dataset.room = r.id;
    btn.textContent = `# ${r.id}  (${r.memberCount})`;
    btn.onclick = () => joinRoom(r.id);
    el.appendChild(btn);
  }
}

function updatePresence(users) {
  document.getElementById("online-count").textContent = users.length;
  const el = document.getElementById("presence-list");
  el.innerHTML = "";
  for (const u of users) {
    const d = document.createElement("div");
    d.className = "user-item";
    d.innerHTML = `<span class="dot ${u.status === "away" ? "away" : u.status === "busy" ? "busy" : ""}"></span>${escHtml(u.name)}`;
    el.appendChild(d);
  }
}

function appendMessage(msg) {
  const isOwn = msg.from?.id === myId;
  const el = document.createElement("div");
  el.className = "msg" + (isOwn ? " own" : "");
  el.dataset.msgId = msg.id;
  el.innerHTML = `
    <div class="msg-header">
      <span class="msg-name">${escHtml(msg.from?.name || "?")}</span>
      <span class="msg-ts">${formatTs(msg.ts)}</span>
    </div>
    <div class="msg-text">${escHtml(msg.text)}</div>
  `;
  const container = document.getElementById("chat-messages");
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

function appendSystemMsg(text) {
  const el = document.createElement("div");
  el.className = "msg system";
  el.textContent = text;
  const container = document.getElementById("chat-messages");
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function clearMessages() {
  document.getElementById("chat-messages").innerHTML = "";
  pendingMessages.clear();
}

const typingUsers = new Set();
function showTyping(name) {
  typingUsers.add(name);
  renderTyping();
}
function hideTyping(name) {
  typingUsers.delete(name);
  renderTyping();
}
function renderTyping() {
  const el = document.getElementById("typing-indicator");
  if (typingUsers.size === 0) { el.textContent = ""; return; }
  const names = [...typingUsers].join(", ");
  el.textContent = `${names} ${typingUsers.size === 1 ? "печатает" : "печатают"}...`;
}

function formatTs(ts) {
  return new Date(ts).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ─── Действия ─────────────────────────────────────
function joinRoom(roomId) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "joinRoom", params: { room: roomId } }));
}

function sendMessage() {
  const input = document.getElementById("msg-input");
  const text = input.value.trim();
  if (!text || !currentRoom || !ws || ws.readyState !== 1) return;

  // Optimistic UI
  const tempId = `temp-${Date.now()}`;
  const optimisticMsg = {
    id: tempId,
    from: { id: myId, name: myName },
    text,
    ts: Date.now(),
  };
  const el = appendMessage(optimisticMsg);
  el.classList.add("sending");
  pendingMessages.set(tempId, el);

  ws.send(JSON.stringify({ type: "sendMessage", params: { room: currentRoom, text, tempId } }));
  input.value = "";

  // Остановить typing
  clearTimeout(typingTimer);
  ws.send(JSON.stringify({ type: "stopTyping", params: { room: currentRoom } }));
}

function setStatus(status) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "setStatus", params: { status } }));
}

// Keyboard handlers
document.getElementById("msg-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
    return;
  }
  // Typing indicator
  if (!currentRoom || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: "typing", params: { room: currentRoom } }));
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    ws?.send(JSON.stringify({ type: "stopTyping", params: { room: currentRoom } }));
  }, 2000);
});
</script>
</body>
</html>
